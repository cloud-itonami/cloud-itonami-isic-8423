name: CI

# deps.edn pins langgraph via a real git coordinate (:git/sha), not
# :local/root -- a plain single-repo checkout resolves the classpath,
# no sibling checkout needed.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.4
        with: { cli: latest }
      - name: test
        run: clojure -M:test
